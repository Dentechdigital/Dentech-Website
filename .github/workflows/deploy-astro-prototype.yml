# Deploy experiments/dentech-astro to GitHub Pages when this workflow file is present.
# One-time setup: Repo → Settings → Pages → Build and deployment → Source: GitHub Actions.
# Live URL: https://<owner>.github.io/<repo>/

name: Deploy Astro prototype (GitHub Pages)

on:
  push:
    branches: [experiment/astro-static-prototype]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: astro-prototype-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: experiments/dentech-astro/package-lock.json

      - name: Install and build
        working-directory: experiments/dentech-astro
        env:
          ASTRO_SITE: https://${{ github.repository_owner }}.github.io
          ASTRO_BASE: /${{ github.event.repository.name }}/
        run: npm ci && npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: experiments/dentech-astro/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
