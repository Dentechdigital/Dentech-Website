[build]
  command = "npm run build"
  publish = "dist"

# Local full stack: serves Vite + Netlify Functions (live chat needs GEMINI_API_KEY in .env).
# Run: npx netlify dev →  typically http://localhost:8888
[dev]
  command = "npm run dev"
  targetPort = 3000
  port = 8888

# Production / preview: set in Netlify UI (Site settings → Environment variables).
# Required for Chat tab (Gemini): GEMINI_API_KEY
# Optional: GEMINI_MODEL (default gemini-2.0-flash in netlify/functions/chat-completions.ts)

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must revalidate so new deploys activate; workbox vendor chunk is hashed and safe to cache long.
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/workbox-*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # frame-src: allow Google Maps embed on Contact (iframe falls back to default-src without this).
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https://images.unsplash.com; font-src 'self' data:; style-src 'self'; script-src 'self'; connect-src 'self'; frame-src 'self' https://www.google.com https://maps.google.com https://www.gstatic.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

